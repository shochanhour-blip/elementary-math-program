<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><ruby>小学校<rt>しょうがっこう</rt></ruby>むけ <ruby>掛け算<rt>かけざん</rt></ruby>がくしゅう</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="controls">
    <div class="control-row">
      <div class="control-left">
        <div class="input-row">
          <div class="input-pair">
            <input id="rowInput" type="number" min="1" value="3" aria-label="ぎょうのかず">
            <span class="cross">×</span>
            <input id="colInput" type="number" min="1" value="3" aria-label="れつのかず">
          </div>
          <button id="generateBtn" class="cat-button" aria-label="じっこう">😸</button>
        </div>
        <div class="palette" aria-label="いろをえらぶ">
          <div id="colorPalette" class="palette-swatches" role="group"></div>
        </div>
      </div>
      <div class="button-stack">
        <div class="buttons">
          <button id="showBtn">かけ算を ひょうじ</button>
          <button id="groupingBtn">かこいを ひょうじ</button>
          <button id="swapBtn">いれかえる</button>
        </div>
        <div class="toggle-row">
          <label class="toggle">
            <input id="toggleNumbering" type="checkbox" checked>
            <span>ナンバリングを ひょうじ</span>
          </label>
        </div>
      </div>
    </div>
  </header>

  <main class="board-wrapper">
    <div class="grid-shell">
      <div class="corner"></div>
      <div id="colLabels" class="col-labels"></div>
      <div id="rowLabels" class="row-labels"></div>
      <div id="gridHolder" class="grid-holder">
        <div id="overlay" aria-live="polite"></div>
        <div id="grid" role="grid" aria-label="掛け算のグリッド"></div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
